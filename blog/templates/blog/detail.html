<!DOCTYPE html>
<html>
<head>
    <title>Détail œuvre</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <div class="card shadow p-4">

        <h1>{{ object.titre }}</h1>

        {% if object.image %}
            <img src="{{ object.image.url }}" class="img-fluid mb-3">
        {% endif %}

        <p>{{ object.contenu }}</p>

        <p><strong>Auteur :</strong> {{ object.auteur }}</p>

        <a class="btn btn-secondary" href="{% url 'list' %}">Retour</a>

    </div>

</div>

</body>
</html>
