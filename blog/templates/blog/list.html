<!DOCTYPE html>
<html>
<head>
    <title>Blog UNCHK - Œuvres</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h1 class="text-center mb-4">🎨 Galerie des Œuvres</h1>

    <div class="text-end mb-3">
        <a class="btn btn-primary" href="{% url 'create' %}">+ Ajouter une œuvre</a>
    </div>

    <div class="row">
        {% for a in object_list %}
        <div class="col-md-4 mb-4">

            <div class="card shadow">

                {% if a.image %}
                    <img src="{{ a.image.url }}" class="card-img-top" height="200">
                {% endif %}

                <div class="card-body">
                    <h5 class="card-title">{{ a.titre }}</h5>
                    <p class="card-text">{{ a.contenu|truncatewords:15 }}</p>
                    <p><strong>Par :</strong> {{ a.auteur }}</p>

                    <a class="btn btn-info btn-sm" href="{% url 'detail' a.id %}">Voir</a>
                    <a class="btn btn-warning btn-sm" href="{% url 'update' a.id %}">Modifier</a>
                    <a class="btn btn-danger btn-sm" href="{% url 'delete' a.id %}">Supprimer</a>
                </div>

            </div>

        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
