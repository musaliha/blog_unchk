<!DOCTYPE html>
<html>
<head>
    <title>Recherche - Blog UNCHK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <!-- 🔙 Retour -->
    <a href="{% url 'list' %}" class="btn btn-secondary mb-3">← Retour</a>

    <!-- 🔍 Titre -->
    <h2 class="mb-4">Résultats pour : "{{ query }}"</h2>

    <div class="row">
        {% for article in results %}
        <div class="col-md-4 mb-4">

            <div class="card shadow">

                {% if article.image %}
                    <img src="{{ article.image.url }}" class="card-img-top" height="200">
                {% endif %}

                <div class="card-body">
                    <h5 class="card-title">{{ article.titre }}</h5>
                    <p class="card-text">{{ article.contenu|truncatewords:15 }}</p>
                    <p><strong>Par :</strong> {{ article.auteur }}</p>

                    <a href="{% url 'detail' article.id %}" class="btn btn-info btn-sm">Voir</a>
                </div>

            </div>

        </div>
        {% empty %}
            <div class="col-12">
                <div class="alert alert-warning text-center">
                    ❌ Aucun résultat trouvé
                </div>
            </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
